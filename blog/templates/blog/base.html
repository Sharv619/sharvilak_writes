<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}sharvilak_writes{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; color: #222; background: #fff; line-height: 1.7; }
        a { color: #222; }
        a:hover { text-decoration: none; }

        .site-header { border-bottom: 1px solid #eee; padding: 1.5rem 0; margin-bottom: 3rem; }
        .container { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
        .site-header .container { display: flex; justify-content: space-between; align-items: center; }
        .site-title { font-size: 1.4rem; font-weight: bold; text-decoration: none; letter-spacing: -0.5px; }
        nav a { margin-left: 1.5rem; font-size: 0.9rem; text-decoration: none; color: #555; }
        nav a:hover { color: #222; }

        main { padding-bottom: 4rem; }

        .messages { list-style: none; margin-bottom: 1.5rem; }
        .messages li { padding: 0.75rem 1rem; background: #f5f5f5; border-left: 3px solid #222; margin-bottom: 0.5rem; font-size: 0.9rem; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="site-title">sharvilak_writes</a>
            <nav>
                {% if user.is_authenticated %}
                    <a href="{% url 'post-create' %}">New Post</a>
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
